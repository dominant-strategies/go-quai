name: Publish Docker image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: Docker Hub repository name
        required: true
        default: go-quai
      namespace:
        description: Docker Hub account or organization namespace.
        required: false
        default: quainetwork
      tag:
        description: Image tag to publish
        required: true
        default: latest
      push_latest:
        description: Also tag and push latest
        required: true
        type: boolean
        default: true
      platforms:
        description: Target platforms
        required: true
        default: linux/amd64

permissions:
  contents: read

jobs:
  docker:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          namespace="${{ inputs.namespace }}"
          if [[ -z "$namespace" ]]; then
            namespace="${{ secrets.DOCKERHUB_USERNAME }}"
          fi

          image="${namespace}/${{ inputs.image_name }}"
          tags="${image}:${{ inputs.tag }}"

          if [[ "${{ inputs.push_latest }}" == "true" && "${{ inputs.tag }}" != "latest" ]]; then
            tags="${tags},${image}:latest"
          fi

          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
